<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Trello Clone DnD</title>
</head>

<body>
  <div class="board">
    <div class="column" data-column="todo">
      <h3 class="column-title">TODO</h3>
      <div class="cards-container"></div>
      <div class="add-card-wrapper">
        <button class="add-card-btn">+ Add another card</button>
        <div class="add-card-form hidden">
          <textarea placeholder="Enter a title for this card..."></textarea>
          <div class="form-controls">
            <button class="save-card-btn">Add Card</button>
            <button class="cancel-card-btn">✖</button>
          </div>
        </div>
      </div>
    </div>

    <div class="column" data-column="inprogress">
      <h3 class="column-title">IN PROGRESS</h3>
      <div class="cards-container"></div>
      <div class="add-card-wrapper">
        <button class="add-card-btn">+ Add another card</button>
        <div class="add-card-form hidden">
          <textarea placeholder="Enter a title for this card..."></textarea>
          <div class="form-controls">
            <button class="save-card-btn">Add Card</button>
            <button class="cancel-card-btn">✖</button>
          </div>
        </div>
      </div>
    </div>

    <div class="column" data-column="done">
      <h3 class="column-title">DONE</h3>
      <div class="cards-container"></div>
      <div class="add-card-wrapper">
        <button class="add-card-btn">+ Add another card</button>
        <div class="add-card-form hidden">
          <textarea placeholder="Enter a title for this card..."></textarea>
          <div class="form-controls">
            <button class="save-card-btn">Add Card</button>
            <button class="cancel-card-btn">✖</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
